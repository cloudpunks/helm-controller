---
# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json
name: dist

"on":
  workflow_dispatch:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  dist:
    runs-on: ubuntu-latest

    steps:
      - name: Generate token
        id: token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.TOKEN_EXCHANGE_APP }}
          private-key: ${{ secrets.TOKEN_EXCHANGE_KEY }}
          permission-contents: write
          permission-pull-requests: write
          permission-issues: write
          permission-packages: write

      - name: Checkout source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          token: ${{ steps.token.outputs.token }}

      - name: Build manifest
        uses: actionhippie/kustomize@f570f804e966eb0370843768d8f0b9bcda52948e # v3
        with:
          target: dist/manifest.yml

      - name: Source rebase
        run: git pull --autostash --rebase

      - name: Commit changes
        if: github.event_name != 'pull_request'
        uses: EndBug/add-and-commit@290ea2c423ad77ca9c62ae0f5b224379612c0321 # v10
        with:
          author_name: GitHub Actions
          author_email: ops@cloudpunks.de
          add: dist/manifest.yml
          message: "chore: automated dist update [skip ci]"
          push: true
          commit: --signoff

...
