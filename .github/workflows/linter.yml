---
# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json
name: linter

"on":
  workflow_dispatch:
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  linter:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Lint manifest
        uses: actionhippie/yamllint@7ebdbe788da2c5652f257a60f7b2f120e315ada7 # v1
        with:
          strict: true

...
